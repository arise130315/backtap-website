<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快捷翻译 SnapTranslate — 轻点背面，轻松翻译</title>
  <meta name="description" content="为 iPhone / iPad 打造的快速翻译工具。轻点设备背面即可识图翻译，所见即所得。" />
  <meta property="og:title" content="快捷翻译 SnapTranslate" />
  <meta property="og:description" content="轻点背面，轻松翻译。" />
  <meta property="og:type" content="website" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#007AFF", hover: "#0a84ff" },
            ink: { 900: "#000000", 800: "#0a0a0a", 700: "#111111", 600: "#1d1d1f" },
            fg: { primary: "#f5f5f7", secondary: "#a1a1a6", muted: "#86868b" },
          },
          fontFamily: {
            sans: ["Inter", "-apple-system", "BlinkMacSystemFont", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "sans-serif"],
          },
          letterSpacing: { tight: "-0.02em", tighter: "-0.03em" },
        },
      },
    };
  </script>

  <style>
    html, body { background-color: #000; color: #f5f5f7; -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(0, 122, 255, 0.4); }

    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .fade-up-1 { animation-delay: 0s; }
    .fade-up-2 { animation-delay: 0.1s; }
    .fade-up-3 { animation-delay: 0.2s; }
    .fade-up-4 { animation-delay: 0.35s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-scrolled {
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glow-top {
      background: radial-gradient(ellipse at top, rgba(0, 122, 255, 0.12), transparent 60%);
    }
  </style>
</head>
<body class="font-sans bg-ink-900 text-fg-primary">

  <header id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b border-transparent">
    <nav class="mx-auto max-w-6xl px-6 h-16 flex items-center justify-between">
      <a href="#" class="flex items-center gap-2 text-sm font-medium tracking-tight">
        <img src="public/images/logo.png" alt="快捷翻译 Logo" class="w-7 h-7 rounded-md" />
        <span data-i18n="brand">快捷翻译</span>
      </a>

      <div class="flex items-center gap-4">
        <button id="lang-toggle" class="text-[13px] text-fg-secondary hover:text-fg-primary transition-colors" aria-label="Toggle language">EN</button>
        <a href="#" class="text-[13px] font-medium px-4 h-8 inline-flex items-center rounded-full border border-white/25 text-fg-primary hover:border-white/60 hover:bg-white/5 transition-all" data-i18n="nav.download">立即下载</a>
      </div>
    </nav>
  </header>

  <main class="min-h-screen bg-ink-900">
    <section class="relative pt-32 pb-24 md:pt-40 md:pb-32 overflow-hidden">
      <div class="pointer-events-none absolute inset-x-0 top-0 h-[600px] glow-top"></div>

      <div class="mx-auto max-w-6xl px-6 text-center relative">
        <h1 class="fade-up fade-up-1 text-5xl md:text-7xl font-semibold tracking-tighter leading-[1.05] text-fg-primary" data-i18n="hero.title">
          轻点背面，轻松翻译。
        </h1>

        <p class="fade-up fade-up-2 mt-6 max-w-2xl mx-auto text-lg md:text-xl text-fg-secondary leading-relaxed" data-i18n="hero.subtitle">
          为iOS设备打造的极速翻译工具，只需轻点设备背面，瞬间识图翻译。
        </p>

        <div class="fade-up fade-up-3 mt-10 flex items-center justify-center gap-3">
          <div class="relative group">
            <a href="#" class="inline-flex items-center justify-center h-12 px-7 rounded-full bg-brand hover:bg-brand-hover text-white text-base font-medium border border-transparent transition-all hover:scale-[1.03]" style="box-shadow: 0 8px 32px -8px rgba(0,122,255,0.6);" data-i18n="hero.cta">
              立即下载
            </a>
            <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 text-xs rounded-md bg-ink-700 text-fg-primary border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap" data-i18n="hero.ctaTooltip">
              仅支持iOS版本
            </span>
          </div>
          <a href="tutorial.html" class="inline-flex items-center justify-center h-12 px-7 rounded-full border border-white/30 text-fg-primary hover:border-white/60 hover:bg-white/5 text-base font-medium transition-all hover:scale-[1.03]" data-i18n="hero.tutorial">
            详细教程
          </a>
        </div>

        <div class="fade-up fade-up-4 mt-20 md:mt-24">
          <div class="relative mx-auto w-full max-w-[300px] aspect-[9/19.5] rounded-[36px] overflow-hidden bg-ink-700 border border-white/[0.08]" style="box-shadow: 0 24px 80px -20px rgba(0,0,0,0.8);">
            <video class="w-full h-full object-cover" autoplay muted loop playsinline preload="metadata">
              <source src="public/videos/教程.mp4" type="video/mp4" />
              <span data-i18n="hero.videoFallback">您的浏览器不支持视频播放。</span>
            </video>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const navbar = document.getElementById("navbar");
    const onScroll = () => {
      if (window.scrollY > 8) navbar.classList.add("nav-scrolled");
      else navbar.classList.remove("nav-scrolled");
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();

    const dict = {
      zh: {
        brand: "快捷翻译",
        "nav.download": "立即下载",
        "hero.title": "轻点背面，轻松翻译。",
        "hero.subtitle": "为iOS设备打造的极速翻译工具，只需轻点设备背面，瞬间识图翻译。",
        "hero.cta": "立即下载",
        "hero.ctaTooltip": "仅支持iOS版本",
        "hero.tutorial": "详细教程",
        "hero.videoFallback": "您的浏览器不支持视频播放。",
      },
      en: {
        brand: "SnapTranslate",
        "nav.download": "Download",
        "hero.title": "Tap the back. Instantly translate.",
        "hero.subtitle": "A blazing-fast translation tool for iOS devices. Just tap the back to instantly translate what you see.",
        "hero.cta": "Download",
        "hero.ctaTooltip": "iOS only",
        "hero.tutorial": "Tutorial",
        "hero.videoFallback": "Your browser does not support the video tag.",
      },
    };

    let lang = "zh";
    const toggleBtn = document.getElementById("lang-toggle");

    const applyLang = () => {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[lang][key]) el.textContent = dict[lang][key];
      });
      toggleBtn.textContent = lang === "zh" ? "EN" : "中";
    };

    toggleBtn.addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      applyLang();
    });
  </script>
</body>
</html>
