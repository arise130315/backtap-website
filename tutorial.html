  <script>
    const navbar = document.getElementById("navbar");
    const onScroll = () => {
      if (window.scrollY > 8) navbar.classList.add("nav-scrolled");
      else navbar.classList.remove("nav-scrolled");
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();

    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.1, rootMargin: "0px 0px -80px 0px" });
    document.querySelectorAll(".reveal").forEach((el) => io.observe(el));

    const dict = {
      zh: {
        "tutorial.title": "使用教程",
        "tutorial.done": "完成 🎉",
      },
      en: {
        "tutorial.title": "Tutorial",
        "tutorial.done": "Done 🎉",
      },
    };
    let lang = "zh";
    const toggleBtn = document.getElementById("lang-toggle");
    const applyLang = () => {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[lang][key]) el.textContent = dict[lang][key];
      });
      document.querySelectorAll("[data-brand-zh]").forEach(el => el.classList.toggle("hidden", lang !== "zh"));
      document.querySelectorAll("[data-brand-en]").forEach(el => el.classList.toggle("hidden", lang !== "en"));
      toggleBtn.textContent = lang === "zh" ? "英文" : "中文";
    };
    toggleBtn.addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      applyLang();
    });
  </script>
