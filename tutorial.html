<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>详细教程 — 快捷翻译 SnapTranslate</title>
  <meta name="description" content="快捷翻译使用教程。" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#007AFF", hover: "#0a84ff" },
            ink: { 900: "#000000", 800: "#0a0a0a", 700: "#111111", 600: "#1d1d1f" },
            fg: { primary: "#f5f5f7", secondary: "#a1a1a6", muted: "#86868b" },
          },
          fontFamily: {
            sans: ["Inter", "-apple-system", "BlinkMacSystemFont", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "sans-serif"],
          },
          letterSpacing: { tight: "-0.02em", tighter: "-0.03em" },
        },
      },
    };
  </script>

  <style>
    html, body { background-color: #000; color: #f5f5f7; -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(0, 122, 255, 0.4); }

    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .fade-up-1 { animation-delay: 0s; }
    .fade-up-2 { animation-delay: 0.1s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-scrolled {
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
  </style>
</head>
<body class="font-sans bg-ink-900 text-fg-primary">

  <header id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b border-transparent">
    <nav class="mx-auto max-w-6xl px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 text-sm font-medium tracking-tight">
        <img src="public/images/logo.png" alt="快捷翻译 Logo" class="w-7 h-7 rounded-md" />
        <span data-i18n="brand">快捷翻译</span>
      </a>

      <div class="flex items-center gap-4">
        <button id="lang-toggle" class="text-[13px] text-fg-secondary hover:text-fg-primary transition-colors" aria-label="Toggle language">EN</button>
        <a href="#" class="text-[13px] font-medium px-4 h-8 inline-flex items-center rounded-full border border-white/25 text-fg-primary hover:border-white/60 hover:bg-white/5 transition-all" data-i18n="nav.download">立即下载</a>
      </div>
    </nav>
  </header>

  <main class="min-h-screen bg-ink-900 pt-32 pb-24">
    <div class="mx-auto max-w-6xl px-6">
      <h1 class="fade-up fade-up-1 text-4xl md:text-5xl font-semibold tracking-tighter text-center mb-16" data-i18n="tutorial.title">
        详细教程
      </h1>

      <div class="fade-up fade-up-2 space-y-6">
        <img src="public/images/img1.png" alt="教程图 1" class="w-full h-auto rounded-2xl" />
        <img src="public/images/img2.png" alt="教程图 2" class="w-full h-auto rounded-2xl" />
        <div class="text-center pt-16 text-5xl md:text-7xl font-semibold tracking-tighter" data-i18n="tutorial.done">
          完成 🎉
        </div>
      </div>
    </div>
  </main>

  <script>
    const navbar = document.getElementById("navbar");
    const onScroll = () => {
      if (window.scrollY > 8) navbar.classList.add("nav-scrolled");
      else navbar.classList.remove("nav-scrolled");
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();

    const dict = {
      zh: {
        brand: "快捷翻译",
        "nav.download": "立即下载",
        "tutorial.title": "详细教程",
        "tutorial.done": "完成 🎉",
      },
      en: {
        brand: "SnapTranslate",
        "nav.download": "Download",
        "tutorial.title": "Tutorial",
        "tutorial.done": "Done 🎉",
      },
    };

    let lang = "zh";
    const toggleBtn = document.getElementById("lang-toggle");

    const applyLang = () => {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[lang][key]) el.textContent = dict[lang][key];
      });
      toggleBtn.textContent = lang === "zh" ? "EN" : "中";
    };

    toggleBtn.addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      applyLang();
    });
  </script>
</body>
</html>
